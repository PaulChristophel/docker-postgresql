name: Build and publish PostgreSQL 18 image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: docker.io/pcm0/postgres
  PG_MAJOR: "18"
  PG_VERSION: "18.4"
  PG_SHA256: 81a81ec695fb0c7901407defaa1d2f7973617154cf27ba74e3a7ab8e64436094

jobs:
  build:
    name: Build ${{ matrix.tag_variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: photon
            dockerfile: photon.dockerfile
            tag_variant: standard-photon5
            untrusted: false
            latest: true
          - variant: photon
            dockerfile: photon.dockerfile
            tag_variant: standard-photon5-untrusted
            untrusted: true
            latest: false
          - variant: fedora
            dockerfile: fedora.dockerfile
            tag_variant: standard-fedora44
            untrusted: false
            latest: false
          - variant: fedora
            dockerfile: fedora.dockerfile
            tag_variant: standard-fedora44-untrusted
            untrusted: true
            latest: false
          - variant: rockylinux
            dockerfile: rockylinux.dockerfile
            tag_variant: standard-rocky10
            untrusted: false
            latest: false
          - variant: rockylinux
            dockerfile: rockylinux.dockerfile
            tag_variant: standard-rocky10-untrusted
            untrusted: true
            latest: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: pcm0
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.PG_VERSION }}-${{ matrix.tag_variant }}
            type=raw,value=${{ env.PG_MAJOR }}-${{ matrix.tag_variant }}
            type=raw,value=latest,enable=${{ matrix.latest }}
            type=sha,prefix=${{ env.PG_MAJOR }}-${{ matrix.tag_variant }}-sha-

      - name: Record build timestamp
        id: build
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            PG_MAJOR=${{ env.PG_MAJOR }}
            PG_VERSION=${{ env.PG_VERSION }}
            PG_SHA256=${{ env.PG_SHA256 }}
            WITH_UNTRUSTED_LANGUAGES=${{ matrix.untrusted }}
            IMAGE_REPOSITORY=${{ env.IMAGE_NAME }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_CREATED=${{ steps.build.outputs.created }}
          cache-from: type=gha,scope=postgres-${{ env.PG_MAJOR }}-${{ matrix.tag_variant }}
          cache-to: type=gha,mode=max,scope=postgres-${{ env.PG_MAJOR }}-${{ matrix.tag_variant }}

      - name: Generate provenance attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/pcm0/postgres
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
