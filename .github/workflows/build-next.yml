name: Build and publish PostgreSQL 19 beta image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: docker.io/pcm0/postgres
  PG_MAJOR: "19"
  PG_VERSION: "19beta2"
  PG_SHA256: f1fb4373f4b0f4db896964f3e5b01658ff0acebd595da7558436ccf0d63b82b2
  PG_CRON_COMMIT: c7609cce5c9f5fd8bcbab536cef08803a38bf6c1
  PG_CRON_SOURCE_SHA256: f566a711199227715f871eebd21abea744bf9510d041ede7e86c1916bbaa8826
  PGAUDIT_VERSION: "19.0"
  PGAUDIT_COMMIT: 3104214bad06516608eb851eb8f9d4e1b85b0cc4
  PGAUDIT_SOURCE_SHA256: 5980385c472bcf0c1fdf719c79dd56190837c5f77af07ca19638889823e79ffd

jobs:
  build:
    name: Build ${{ matrix.tag_variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: photon
            dockerfile: photon.dockerfile
            tag_variant: photon
            untrusted: false
            latest: false
            sha_prefix: 19-photon-standard-sha-
          - variant: photon
            dockerfile: photon.dockerfile
            tag_variant: photon-untrusted
            untrusted: true
            latest: false
            sha_prefix: 19-photon-untrusted-sha-
          - variant: fedora
            dockerfile: fedora.dockerfile
            tag_variant: fedora
            untrusted: false
            latest: false
            sha_prefix: 19-fedora-standard-sha-
          - variant: fedora
            dockerfile: fedora.dockerfile
            tag_variant: fedora-untrusted
            untrusted: true
            latest: false
            sha_prefix: 19-fedora-untrusted-sha-
          - variant: rockylinux
            dockerfile: rockylinux.dockerfile
            tag_variant: rockylinux
            untrusted: false
            latest: false
            sha_prefix: 19-rockylinux-standard-sha-
          - variant: rockylinux
            dockerfile: rockylinux.dockerfile
            tag_variant: rockylinux-untrusted
            untrusted: true
            latest: false
            sha_prefix: 19-rockylinux-untrusted-sha-
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: pcm0
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.PG_VERSION }}-${{ matrix.tag_variant }}
            type=raw,value=${{ env.PG_MAJOR }}-${{ matrix.tag_variant }}
            type=raw,value=latest,enable=${{ matrix.latest }}
            type=sha,prefix=${{ matrix.sha_prefix }}

      - name: Record build timestamp
        id: build
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            PG_MAJOR=${{ env.PG_MAJOR }}
            PG_VERSION=${{ env.PG_VERSION }}
            PG_SHA256=${{ env.PG_SHA256 }}
            WITH_UNTRUSTED_LANGUAGES=${{ matrix.untrusted }}
            PG_CRON_COMMIT=${{ env.PG_CRON_COMMIT }}
            PG_CRON_SOURCE_SHA256=${{ env.PG_CRON_SOURCE_SHA256 }}
            PGAUDIT_VERSION=${{ env.PGAUDIT_VERSION }}
            PGAUDIT_COMMIT=${{ env.PGAUDIT_COMMIT }}
            PGAUDIT_SOURCE_SHA256=${{ env.PGAUDIT_SOURCE_SHA256 }}
            IMAGE_REPOSITORY=${{ env.IMAGE_NAME }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_CREATED=${{ steps.build.outputs.created }}
          cache-from: type=gha,scope=postgres-${{ env.PG_MAJOR }}-${{ matrix.tag_variant }}
          cache-to: type=gha,mode=max,scope=postgres-${{ env.PG_MAJOR }}-${{ matrix.tag_variant }}

      - name: Generate provenance attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/pcm0/postgres
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
