name: Build and publish PostgreSQL 19 beta image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: docker.io/pcm0/postgres
  PG_MAJOR: "19"
  PG_VERSION: "19beta2"
  PG_SHA256: f1fb4373f4b0f4db896964f3e5b01658ff0acebd595da7558436ccf0d63b82b2
  PGAUDIT_VERSION: "19.0"
  PGAUDIT_COMMIT: 3104214bad06516608eb851eb8f9d4e1b85b0cc4
  PGAUDIT_SOURCE_SHA256: 5980385c472bcf0c1fdf719c79dd56190837c5f77af07ca19638889823e79ffd

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: pcm0
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.PG_VERSION }}-photon
            type=raw,value=${{ env.PG_MAJOR }}-photon
            type=sha,prefix=${{ env.PG_MAJOR }}-sha-

      - name: Record build timestamp
        id: build
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: photon.dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            PG_MAJOR=${{ env.PG_MAJOR }}
            PG_VERSION=${{ env.PG_VERSION }}
            PG_SHA256=${{ env.PG_SHA256 }}
            PGAUDIT_VERSION=${{ env.PGAUDIT_VERSION }}
            PGAUDIT_COMMIT=${{ env.PGAUDIT_COMMIT }}
            PGAUDIT_SOURCE_SHA256=${{ env.PGAUDIT_SOURCE_SHA256 }}
            IMAGE_REPOSITORY=${{ env.IMAGE_NAME }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_CREATED=${{ steps.build.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate provenance attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/pcm0/postgres
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
