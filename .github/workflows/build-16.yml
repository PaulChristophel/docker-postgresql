name: Build and publish PostgreSQL 16 image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: docker.io/pcm0/postgres
  PG_MAJOR: "16"
  PG_VERSION: "16.14"
  PG_SHA256: f6d077142737920858ce958ccdb75c6ee137a63b5b0853c70693d401ac7e3471
  PGAUDIT_VERSION: "16.1"
  PGAUDIT_COMMIT: a81792e8a4ea8f7aaf75bd610fcc4c2f96650bdc
  PGAUDIT_SOURCE_SHA256: 3bae908ab70ba0c6f51224009dbcfff1a97bd6104c6273297a64292e1b921fee

jobs:
  build:
    name: Build ${{ matrix.tag_variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: photon
            dockerfile: photon.dockerfile
            tag_variant: photon
            untrusted: false
            latest: false
            sha_prefix: 16-sha-
          - variant: photon
            dockerfile: photon.dockerfile
            tag_variant: photon-untrusted
            untrusted: true
            latest: false
            sha_prefix: 16-photon-untrusted-sha-
          - variant: fedora
            dockerfile: fedora.dockerfile
            tag_variant: fedora
            untrusted: false
            latest: false
            sha_prefix: 16-fedora-sha-
          - variant: fedora
            dockerfile: fedora.dockerfile
            tag_variant: fedora-untrusted
            untrusted: true
            latest: false
            sha_prefix: 16-fedora-untrusted-sha-
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: pcm0
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.PG_VERSION }}-${{ matrix.tag_variant }}
            type=raw,value=${{ env.PG_MAJOR }}-${{ matrix.tag_variant }}
            type=raw,value=latest,enable=${{ matrix.latest }}
            type=sha,prefix=${{ matrix.sha_prefix }}

      - name: Record build timestamp
        id: build
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            PG_MAJOR=${{ env.PG_MAJOR }}
            PG_VERSION=${{ env.PG_VERSION }}
            PG_SHA256=${{ env.PG_SHA256 }}
            WITH_UNTRUSTED_LANGUAGES=${{ matrix.untrusted }}
            PGAUDIT_VERSION=${{ env.PGAUDIT_VERSION }}
            PGAUDIT_COMMIT=${{ env.PGAUDIT_COMMIT }}
            PGAUDIT_SOURCE_SHA256=${{ env.PGAUDIT_SOURCE_SHA256 }}
            IMAGE_REPOSITORY=${{ env.IMAGE_NAME }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_CREATED=${{ steps.build.outputs.created }}
          cache-from: type=gha,scope=postgres-${{ env.PG_MAJOR }}-${{ matrix.tag_variant }}
          cache-to: type=gha,mode=max,scope=postgres-${{ env.PG_MAJOR }}-${{ matrix.tag_variant }}

      - name: Generate provenance attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/pcm0/postgres
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
